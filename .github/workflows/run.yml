name: Daily News Scraper

on:
  schedule:
    # 每天 8:15
    - cron: '15 0 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🌟 必须确保有写权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true # 🌟 确保推送权限持久化

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests openai

      - name: Run Scraper
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 🌟 强制添加这两个文件，即使它们没有变化
          git add history.json weekly_pool.json
          git commit -m "Update weekly pool [skip ci]" || exit 0
          git push
