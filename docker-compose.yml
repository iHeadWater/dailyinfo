services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: dailyinfo_freshrss
    ports:
      - "8081:80"
    volumes:
      - ~/.freshrss/data:/var/www/FreshRSS/data
    environment:
      - TZ=Asia/Shanghai
      - CRON_MIN=*/15
    restart: unless-stopped
    networks:
      - dailyinfo_net

networks:
  dailyinfo_net:
    driver: bridge